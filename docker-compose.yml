services:
  db:
    image: mysql:8.0
    container_name: lapor_sampah_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: persampahan_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: lapor_sampah_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: dev-docker-secret
      PORT: 5000
      UPLOAD_FOLDER: uploads
      DATABASE_URL: mysql+pymysql://appuser:apppass@db:3306/persampahan_db
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  db_data: