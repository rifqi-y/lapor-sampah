services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lapor_sampah_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  uploads_data: